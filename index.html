<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MovieTracker</title>
</head>
<body>
    <div class="container1">
        <div class="column" id="todo">
            <h2>Буду смотреть</h2>
<form id="forms" class="forms-css">
  <div class="pol1">
    <label for="nameFilm">
      Название Фильма
      <input 
             type="text"
             id="nameFilm"
             placeholder="Введите название"
             required
             >
    </label>
  </div>
  <div class="pol1">
    <label for="imgFilm">
      Ссылка на картинку
     <input 
           type="text" 
           id="imgFilm"
           placeholder="Вставьте ссылку на изображение"              required
           >
    </label>
  </div>
<button form="submit" class="tuk">Добавить Фильм</button>
</form>
        </div>
        <div class="column" id="doing">
            <h2>Смотрю</h2>
        </div>
        <div class="column" id="done">
            <h2>Просмотрено</h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
